name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME || 'pe-expo-project-2026' }}
  FRONTEND_EDGE_STACK_NAME: ${{ vars.FRONTEND_EDGE_STACK_NAME || 'pe-expo-project-2026-web-edge' }}
  SAM_DEPLOY_ROLE_ARN: ${{ vars.SAM_DEPLOY_ROLE_ARN }}
  SAM_ARTIFACTS_BUCKET: ${{ vars.SAM_ARTIFACTS_BUCKET }}
  WEB_S3_BUCKET: ${{ vars.WEB_S3_BUCKET }}
  WEB_BUCKET_REGION: ${{ vars.WEB_BUCKET_REGION || 'eu-west-1' }}
  ROUTE53_HOSTED_ZONE_ID: ${{ vars.ROUTE53_HOSTED_ZONE_ID }}
  WEB_APP_DOMAIN: ${{ vars.WEB_APP_DOMAIN }}
  API_APP_DOMAIN: ${{ vars.API_APP_DOMAIN }}
  COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
  GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
  GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.SAM_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          test "$ACCOUNT_ID" = "879641206317" || (echo "Unexpected AWS account: $ACCOUNT_ID" && exit 1)

      - name: Verify deploy configuration
        shell: bash
        run: |
          test -n "$SAM_DEPLOY_ROLE_ARN" || (echo "Missing repo/environment variable: SAM_DEPLOY_ROLE_ARN" && exit 1)
          test -n "$SAM_ARTIFACTS_BUCKET" || (echo "Missing repo/environment variable: SAM_ARTIFACTS_BUCKET" && exit 1)
          test -n "$WEB_S3_BUCKET" || (echo "Missing repo/environment variable: WEB_S3_BUCKET" && exit 1)
          test -n "$ROUTE53_HOSTED_ZONE_ID" || (echo "Missing repo/environment variable: ROUTE53_HOSTED_ZONE_ID" && exit 1)
          test -n "$WEB_APP_DOMAIN" || (echo "Missing repo/environment variable: WEB_APP_DOMAIN" && exit 1)
          test -n "$API_APP_DOMAIN" || (echo "Missing repo/environment variable: API_APP_DOMAIN" && exit 1)
          test -n "$COGNITO_DOMAIN_PREFIX" || (echo "Missing repo/environment variable: COGNITO_DOMAIN_PREFIX" && exit 1)
          test -n "$GOOGLE_OAUTH_CLIENT_ID" || (echo "Missing repo/environment variable: GOOGLE_OAUTH_CLIENT_ID" && exit 1)
          test -n "$GOOGLE_OAUTH_CLIENT_SECRET" || (echo "Missing repo/environment secret: GOOGLE_OAUTH_CLIENT_SECRET" && exit 1)

      - name: Install workspace dependencies
        run: npm ci

      - name: Build SAM application
        run: sam build --template-file apps/api/template.yaml

      - name: Deploy SAM stack
        shell: bash
        env:
          WEB_ALLOWED_ORIGINS: https://${{ env.WEB_APP_DOMAIN }},http://localhost:5173
          AUTH_REDIRECT_URLS: https://${{ env.WEB_APP_DOMAIN }}/,http://localhost:5173/
        run: >-
          sam deploy
          --template-file apps/api/template.yaml
          --stack-name "$SAM_STACK_NAME"
          --region "$AWS_REGION"
          --s3-bucket "$SAM_ARTIFACTS_BUCKET"
          --capabilities CAPABILITY_IAM
          --parameter-overrides
          WebAllowedOrigins="$WEB_ALLOWED_ORIGINS"
          AuthRedirectUrls="$AUTH_REDIRECT_URLS"
          ApiCustomDomainName="$API_APP_DOMAIN"
          HostedZoneId="$ROUTE53_HOSTED_ZONE_ID"
          CognitoDomainPrefix="$COGNITO_DOMAIN_PREFIX"
          GoogleClientId="$GOOGLE_OAUTH_CLIENT_ID"
          GoogleClientSecret="$GOOGLE_OAUTH_CLIENT_SECRET"
          --no-confirm-changeset
          --no-fail-on-empty-changeset

      - name: Deploy frontend edge stack
        run: >-
          aws cloudformation deploy
          --template-file infra/frontend-edge.yaml
          --stack-name "$FRONTEND_EDGE_STACK_NAME"
          --region us-east-1
          --parameter-overrides
          WebAppDomainName="$WEB_APP_DOMAIN"
          HostedZoneId="$ROUTE53_HOSTED_ZONE_ID"
          WebBucketName="$WEB_S3_BUCKET"
          WebBucketRegion="$WEB_BUCKET_REGION"
          --no-fail-on-empty-changeset

      - name: Resolve frontend environment values
        shell: bash
        run: |
          API_BASE_URL=$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" \
            --output text)
          COGNITO_DOMAIN_URL=$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoDomainUrl'].OutputValue" \
            --output text)
          COGNITO_ISSUER=$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoIssuer'].OutputValue" \
            --output text)
          FRONTEND_DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_EDGE_STACK_NAME" \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)
          test -n "$API_BASE_URL" || (echo "Failed to resolve ApiBaseUrl stack output" && exit 1)
          test -n "$USER_POOL_CLIENT_ID" || (echo "Failed to resolve UserPoolClientId stack output" && exit 1)
          test -n "$COGNITO_DOMAIN_URL" || (echo "Failed to resolve CognitoDomainUrl stack output" && exit 1)
          test -n "$COGNITO_ISSUER" || (echo "Failed to resolve CognitoIssuer stack output" && exit 1)
          test -n "$FRONTEND_DISTRIBUTION_ID" || (echo "Failed to resolve FrontendDistributionId stack output" && exit 1)
          echo "VITE_API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"
          echo "VITE_COGNITO_CLIENT_ID=$USER_POOL_CLIENT_ID" >> "$GITHUB_ENV"
          echo "VITE_COGNITO_DOMAIN=$COGNITO_DOMAIN_URL" >> "$GITHUB_ENV"
          echo "VITE_COGNITO_ISSUER=$COGNITO_ISSUER" >> "$GITHUB_ENV"
          echo "FRONTEND_DISTRIBUTION_ID=$FRONTEND_DISTRIBUTION_ID" >> "$GITHUB_ENV"

      - name: Build web app
        run: npm run build:web

      - name: Upload web assets
        run: aws s3 sync apps/web/dist "s3://$WEB_S3_BUCKET" --delete

      - name: Invalidate CloudFront cache
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "$FRONTEND_DISTRIBUTION_ID"
          --paths "/*"
