name: CI

env:
  AWS_REGION: eu-west-1

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint workspaces
        run: npm run lint

      - name: Build workspaces
        run: npm run build

  api-template:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Validate SAM template
        run: >-
          sam validate
          --template-file apps/api/template.yaml
          --region "$AWS_REGION"
          --parameter-overrides
          WebAllowedOrigins="http://localhost:5173,http://localhost:4173"
          AuthRedirectUrls="http://localhost:5173/,http://localhost:4173/"
          ApiCustomDomainName="api.example.invalid"
          HostedZoneId="Z0000000000000EXAMPLE"
          CognitoDomainPrefix="pe-expo-project-2026-ci"
          GoogleClientId="google-client-id-placeholder"
          GoogleClientSecret="google-client-secret-placeholder"
