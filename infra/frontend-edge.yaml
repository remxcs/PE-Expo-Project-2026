AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront, ACM, and Route53 resources for the PE Expo frontend domain.

Parameters:
  WebAppDomainName:
    Type: String
    Description: Public HTTPS domain for the frontend application.
    Default: app.example.invalid
  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for the application domain.
    Default: Z0000000000000EXAMPLE
  WebBucketName:
    Type: String
    Description: Name of the S3 bucket that stores the built frontend assets.
  WebBucketRegion:
    Type: String
    Description: AWS region where the frontend S3 bucket is hosted.
    Default: eu-west-1

Resources:
  FrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName:
        Ref: WebAppDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName:
            Ref: WebAppDomainName
          HostedZoneId:
            Ref: HostedZoneId

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - Ref: WebAppDomainName
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: frontend-s3-website
            DomainName:
              Fn::Sub: ${WebBucketName}.s3-website-${WebBucketRegion}.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: frontend-s3-website
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn:
            Ref: FrontendCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  FrontendAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId:
        Ref: HostedZoneId
      Name:
        Ref: WebAppDomainName
      Type: A
      AliasTarget:
        DNSName:
          Fn::GetAtt:
            - FrontendDistribution
            - DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  FrontendAliasRecordIpv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId:
        Ref: HostedZoneId
      Name:
        Ref: WebAppDomainName
      Type: AAAA
      AliasTarget:
        DNSName:
          Fn::GetAtt:
            - FrontendDistribution
            - DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  FrontendUrl:
    Description: Public HTTPS URL for the frontend application.
    Value:
      Fn::Sub: https://${WebAppDomainName}

  FrontendDistributionId:
    Description: CloudFront distribution ID for cache invalidation.
    Value:
      Ref: FrontendDistribution

  FrontendDistributionDomainName:
    Description: Default CloudFront domain name.
    Value:
      Fn::GetAtt:
        - FrontendDistribution
        - DomainName
